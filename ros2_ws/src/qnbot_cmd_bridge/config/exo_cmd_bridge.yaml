/**:
  ros__parameters:
    # ===================== 数据来源（qnbot_teleoperator）=====================
    # 外骨骼/手柄数据（Joy）：由 qnbot_teleoperator/websocket_teleoperator 发布
    exo_gamepad_topic: "/exo/gamepad_keys"
    # 外骨骼关节（JointState）：可选，用于原样转发（默认不转发）
    exo_joint_command_topic: "/exo/joint_command"
    forward_joint_command: false
    joint_command_forward_topic: "/exo/joint_command_forwarded"

    # ===================== 发布话题（与 f710_teleop 一致）=====================
    cmd_vel_topic: "/svtrobot_cmd"
    lift_cmd_topic: "/lift_control_cmd"

    # ===================== 底盘速度缩放 =====================
    # 线速度/角速度上限（最终输出 = 归一化摇杆值[-1,1] * max_* * 其它缩放）
    velocity.max_linear: 1.0
    velocity.max_angular: 1.0
    # 角速度额外缩放（在 max_angular 基础上再乘一次，>1 更灵敏）
    velocity.angular_scale: 1.0
    # 摇杆方向取反（针对“输入轴”本身，不是对输出取反）
    # - left_x: 左摇杆左右（影响 Twist.linear.y）
    # - left_y: 左摇杆前后（影响 Twist.linear.x；注意我们内部 vx = -left_y * max_linear）
    # - right_x: 右摇杆左右（影响 Twist.angular.z）
    # - right_y: 右摇杆前后（当前未参与底盘控制，仅保留映射）
    invert.left_x: false
    invert.left_y: true
    invert.right_x: false
    invert.right_y: true
    # 右摇杆有输入时，是否禁用左摇杆左右（true=有转向时不允许侧移）
    disable_left_x_when_right_active: false
    # 摇杆死区（小于该阈值直接当 0；数值越小越灵敏）
    deadzone: 0.1
    # ===================== Joy.axes 轴索引映射 =====================
    # 不同数据源 Joy.axes 的顺序可能不同。这里指定哪个 index 对应哪个摇杆轴。
    # 默认按 qnbot_teleoperator 发布的顺序：
    #   axes[0]=left_x, axes[1]=left_y, axes[2]=right_x, axes[3]=right_y
    axis.left_x_index: 0
    axis.left_y_index: 1
    axis.right_x_index: 2
    axis.right_y_index: 3

    # ===================== 手感调参（抑制对角/小幅度过灵敏）=====================
    # expo 曲线：sign(x)*|x|^expo
    # - expo=1.0：线性（原样）
    # - expo>1.0：小幅度更钝、推大仍可到满量程（更适合精细控制）
    input.expo_linear: 1.6   # 左摇杆（vx/vy）
    input.expo_angular: 1.3  # 右摇杆（wz）
    # 主轴优先：轻微偏一点不同时输出 vx+vy，避免“前右只碰一点就同时发送”
    input.axis_priority: true
    # 次轴保留阈值：当 |minor| < |major| * ratio 时，minor 置 0
    # - ratio 越大：越不容易出对角（更“只走直线”）
    # - ratio 越小：越容易出对角（更灵敏）
    input.axis_priority_ratio: 0.6

    # ===================== 发布门控/调试 =====================
    # true=要求 Joy.buttons[3]==1（qnbot 的 enable_vehicle_control）才发布底盘/升降
    # false=忽略该门控（不建议长期关闭）
    require_vehicle_enabled: true
    # 打印收到的 Joy（axes/buttons）用于排查；生产环境可关掉
    debug.print_joy: true
    debug.print_period_s: 1.0
    debug.no_msg_warn_period_s: 2.0

    # ===================== 升降（/lift_control_cmd）=====================
    lift.speed: 500
    # qnbot_teleoperator 发布的 Joy.buttons 定义：
    # - buttons[0..3]：控制状态（双臂/摇杆/回零/小车权限）
    # - buttons[4..9]：左手柄（joystick_k, A, B, C, D, Switch）
    # - buttons[10..15]：右手柄（joystick_k, A, B, C, D, Switch）
    button.lift_up: 5    # 左手柄 A
    button.lift_down: 6  # 左手柄 B
    button.emergency: 12 # 右手柄 B
    # buttons 按下电平：
    # - false：1=按下（常见做法）
    # - true：0=按下（active-low；某些协议/设备会这样）
    buttons.active_low: false

    # true=按频率持续发布 /svtrobot_cmd（即使回中也持续发 0）
    # false=仅在有输入时发布；松杆时补发一次 0（减少刷屏）
    cmd_vel.publish_always: false
